name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The unit tests are deliberately lightweight and don't need the heavy
      # ML stack (TTS/chromadb/torch), so we install only what they import.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.3.2 python-dotenv==1.0.1

      - name: Compile all modules
        run: |
          python -m py_compile config.py main.py \
            bot/*.py llm/*.py memory/*.py persona/*.py stt/*.py tts/*.py tests/*.py

      - name: Run tests
        run: pytest -q
